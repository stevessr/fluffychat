<!DOCTYPE html>
<html>

<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="The cutest messenger in the Matrix network.">
  <meta http-equiv="x-rocket-loader" content="off">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="FluffyChat">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="16x16" href="favicon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/Icon-32.png">
  <link rel="icon" type="image/png" sizes="48x48" href="icons/Icon-48.png">

  <title>FluffyChat</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" type="text/css" href="splash/style.css">
  <script data-cfasync="false" src="Imaging.js"></script>

  <!-- This script adds the flutter initialization JS code -->
  <script data-cfasync="false" src="flutter.js" defer></script>
</head>

<body>
  <script data-cfasync="false">
    window.addEventListener('load', function (ev) {
      if (window.__fluffyBootstrapStarted) {
        return;
      }
      window.__fluffyBootstrapStarted = true;

      {{flutter_js}}
      {{flutter_build_config}}

      _flutter.loader.load({
        serviceWorker: {
          serviceWorkerVersion: {{flutter_service_worker_version}},
        },
      onEntrypointLoaded: function (engineInitializer) {
        engineInitializer.initializeEngine({ useColorEmoji: true }).then(function (appRunner) {
          appRunner.runApp();
        });
      }
      });
    }, { once: true });
  </script>
</body>

</html>
