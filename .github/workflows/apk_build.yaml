name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      build_debug:
        description: "构建 debug 变体（不签名，便于测试安装）"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"
      upload_to_release:
        description: "上传到指定 GitHub Release（需填写 release_tag）"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"
      release_tag:
        description: "目标 Release tag（仅当 upload_to_release=true 时生效）"
        required: false
        default: ""
        type: string
      target_abi:
        description: "目标 ABI：分别构建 armeabi-v7a / arm64-v8a 单架构包，或 both 串联构建两个独立包"
        required: false
        default: "both"
        type: choice
        options:
          - "both"
          - "armeabi-v7a"
          - "arm64-v8a"

concurrency:
  group: apk_build
  cancel-in-progress: false

jobs:
  # Translate the target_abi input into a JSON matrix array so the build job
  # only spawns runners for the requested ABIs (both -> 2 parallel, single -> 1).
  prepare:
    runs-on: ubuntu-latest
    outputs:
      abis: ${{ steps.m.outputs.abis }}
      variant: ${{ steps.m.outputs.variant }}
    steps:
      - id: m
        run: |
          case "${{ github.event.inputs.target_abi || 'both' }}" in
            both)
              echo 'abis=["armeabi-v7a","arm64-v8a"]' >> "$GITHUB_OUTPUT"
              ;;
            armeabi-v7a|arm64-v8a)
              echo "abis=[\"${{ github.event.inputs.target_abi }}\"]" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported target_abi: ${{ github.event.inputs.target_abi }}" >&2
              exit 1
              ;;
          esac
          variant="${{ github.event.inputs.build_debug == 'true' && 'debug' || 'release' }}"
          echo "variant=$variant" >> "$GITHUB_OUTPUT"

  build_apk:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        abi: ${{ fromJSON(needs.prepare.outputs.abis) }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .tool_versions.yaml
          cache: true
      - name: Prepare Google Services
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: bash ./scripts/setup-google-services.sh
      - name: Enable Firebase Messaging
        run: bash ./scripts/add-firebase-messaging.sh
      - uses: ./.github/actions/free_up_space
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - run: flutter pub get

      - name: Prepare release signing (if secrets available)
        if: needs.prepare.outputs.variant != 'debug'
        env:
          FDROID_KEY: ${{ secrets.FDROID_KEY }}
          FDROID_KEY_PASS: ${{ secrets.FDROID_KEY_PASS }}
        run: |
          # prepare-android-release.sh assumes signing secrets and a Ruby/fastlane
          # environment are present. When the secrets are empty (e.g. fork builds)
          # we skip it: app/build.gradle.kts' signingConfigs.release falls back to
          # the bundled android/app/dummy.keystore (committed to the repo), so the
          # release APK is still produced, signed with that throwaway key. Set the
          # secrets to get a properly signed, F-Droid-compatible build.
          if [[ -z "$FDROID_KEY" || -z "$FDROID_KEY_PASS" ]]; then
            echo "FDROID_KEY / FDROID_KEY_PASS not set — skipping release signing setup."
            echo "The release APK will be signed with the bundled dummy.keystore."
            exit 0
          fi
          ./scripts/prepare-android-release.sh

      - name: Build APK
        id: build_apk
        env:
          VARIANT: ${{ needs.prepare.outputs.variant }}
          ABI: ${{ matrix.abi }}
        run: |
          set -e
          # Map ABI to Flutter --target-platform. A single --target-platform build
          # is NOT split-per-abi (which conflicts with build.gradle.kts' ndk.abiFilters
          # workaround for Flutter #162153), so Flutter writes a single app-<variant>.apk
          # which we immediately rename per-ABI.
          case "$ABI" in
            armeabi-v7a) platform="android-arm" ;;
            arm64-v8a)   platform="android-arm64" ;;
            *) echo "Unknown ABI: $ABI" >&2; exit 1 ;;
          esac
          echo "::group::Build $VARIANT APK for $ABI (--target-platform $platform)"
          flutter build apk --"$VARIANT" --target-platform "$platform"
          mv "build/app/outputs/flutter-apk/app-${VARIANT}.apk" \
             "build/app/outputs/flutter-apk/app-${VARIANT}-${ABI}.apk"
          echo "::endgroup::"

      - name: Collect APK artifact
        run: |
          set -e
          mkdir -p artifacts
          variant="${{ needs.prepare.outputs.variant }}"
          abi="${{ matrix.abi }}"
          apk="build/app/outputs/flutter-apk/app-${variant}-${abi}.apk"
          if [[ ! -f "$apk" ]]; then
            echo "Expected APK not found: $apk" >&2
            find build/app/outputs -type f | sort >&2
            exit 1
          fi
          # Rename app-<variant>-<abi>.apk -> fluffychat-<variant>-<abi>.apk
          dest="artifacts/fluffychat-${variant}-${abi}.apk"
          cp "$apk" "$dest"
          echo "Collected: $dest ($(du -h "$apk" | cut -f1))"

      - name: Generate SHA256 checksum
        run: |
          cd artifacts
          sha256sum "fluffychat-${{ needs.prepare.outputs.variant }}-${{ matrix.abi }}.apk" > "checksums-sha256-${{ matrix.abi }}.txt"
          cat "checksums-sha256-${{ matrix.abi }}.txt"

      - name: Upload per-ABI artifact
        uses: actions/upload-artifact@v7
        with:
          name: fluffychat-${{ needs.prepare.outputs.variant }}-${{ matrix.abi }}-apk
          path: |
            artifacts/fluffychat-${{ needs.prepare.outputs.variant }}-${{ matrix.abi }}.apk
            artifacts/checksums-sha256-${{ matrix.abi }}.txt
          if-no-files-found: error
          retention-days: 30

  # Aggregate per-ABI artifacts into one combined upload, and optionally push
  # everything to a GitHub Release. Runs only if at least one build succeeded.
  collect:
    needs: build_apk
    runs-on: ubuntu-latest
    if: always() && needs.build_apk.result != 'skipped'
    permissions:
      contents: write
    steps:
      - name: Download all per-ABI artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts
          pattern: fluffychat-*-apk
          merge-multiple: true

      - name: Verify and list collected artifacts
        run: |
          set -e
          cd artifacts
          echo "--- collected APKs ---"
          find . -name "*.apk" -type f | sort
          apk_count=$(find . -name "*.apk" -type f | wc -l)
          if [[ "$apk_count" -eq 0 ]]; then
            echo "No APK artifacts were produced; all matrix jobs failed." >&2
            exit 1
          fi
          echo "Total APKs: $apk_count"

      - name: Merge SHA256 checksums
        run: |
          cd artifacts
          cat checksums-sha256-*.txt > checksums-sha256.txt
          rm -f checksums-sha256-*.txt
          cat checksums-sha256.txt

      - name: Upload combined APKs
        uses: actions/upload-artifact@v7
        with:
          name: fluffychat-${{ needs.prepare.outputs.variant }}-apk
          path: artifacts/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload combined checksums
        uses: actions/upload-artifact@v7
        with:
          name: fluffychat-${{ needs.prepare.outputs.variant }}-checksums
          path: artifacts/checksums-sha256.txt
          if-no-files-found: error

      - name: Upload APKs to GitHub Release
        if: github.event.inputs.upload_to_release == 'true' && github.event.inputs.release_tag != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          tag="${{ github.event.inputs.release_tag }}"
          echo "Uploading APKs to release $tag"
          for f in artifacts/*.apk artifacts/checksums-sha256.txt; do
            [[ -f "$f" ]] || continue
            name="$(basename "$f")"
            echo " -> $name"
            gh release upload "$tag" "$f" --clobber
          done
