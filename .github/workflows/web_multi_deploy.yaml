name: Deploy Web (EdgeOne + Cloudflare)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: web_multi_deploy
  cancel-in-progress: true

env:
  NODE_VERSION: "22.11.0"
  NPM_CACHE_KEY_SUFFIX: v1

jobs:
  build_web:
    name: Build web artifact
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - run: cat .github/workflows/versions.env >> $GITHUB_ENV
      - name: Build web with shared prefix
        uses: ./.github/actions/web_build_prefix
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web
          if-no-files-found: error
          retention-days: 1
          compression-level: 1

  deploy_edgeone:
    name: Deploy to EdgeOne Pages
    needs:
      - build_web
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Download web artifact
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: build/web
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Cache npm packages
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ env.NODE_VERSION }}-${{ env.NPM_CACHE_KEY_SUFFIX }}-${{ hashFiles('.github/workflows/web_multi_deploy.yaml') }}
          restore-keys: |
            ${{ runner.os }}-npm-${{ env.NODE_VERSION }}-${{ env.NPM_CACHE_KEY_SUFFIX }}-
      - name: Validate EdgeOne secrets
        env:
          EDGEONE_API_TOKEN: ${{ secrets.EDGEONE_API_TOKEN }}
          EDGEONE_PROJECT_NAME: ${{ secrets.EDGEONE_PROJECT_NAME }}
        run: |
          if [ -z "$EDGEONE_API_TOKEN" ]; then
            echo "Missing secret: EDGEONE_API_TOKEN"
            exit 1
          fi
          if [ -z "$EDGEONE_PROJECT_NAME" ]; then
            echo "Missing secret: EDGEONE_PROJECT_NAME"
            exit 1
          fi
      - name: Deploy to EdgeOne Pages
        env:
          EDGEONE_API_TOKEN: ${{ secrets.EDGEONE_API_TOKEN }}
          EDGEONE_PROJECT_NAME: ${{ secrets.EDGEONE_PROJECT_NAME }}
          EDGEONE_ENV: ${{ secrets.EDGEONE_ENV }}
        run: |
          if [ -n "$EDGEONE_ENV" ]; then
            npx --yes edgeone pages deploy build/web -n "$EDGEONE_PROJECT_NAME" -t "$EDGEONE_API_TOKEN" -e "$EDGEONE_ENV"
          else
            npx --yes edgeone pages deploy build/web -n "$EDGEONE_PROJECT_NAME" -t "$EDGEONE_API_TOKEN"
          fi

  deploy_cloudflare:
    name: Deploy to Cloudflare Pages
    needs:
      - build_web
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Download web artifact
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: build/web
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Cache npm packages
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ env.NODE_VERSION }}-${{ env.NPM_CACHE_KEY_SUFFIX }}-${{ hashFiles('.github/workflows/web_multi_deploy.yaml') }}
          restore-keys: |
            ${{ runner.os }}-npm-${{ env.NODE_VERSION }}-${{ env.NPM_CACHE_KEY_SUFFIX }}-
      - name: Normalize and validate Cloudflare secrets
        env:
          RAW_CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          RAW_CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          RAW_CLOUDFLARE_PAGES_PROJECT_NAME: ${{ secrets.CLOUDFLARE_PAGES_PROJECT_NAME }}
        run: |
          set -euo pipefail
          api_token="$(printf '%s' "$RAW_CLOUDFLARE_API_TOKEN" | tr -d '\r\n')"
          account_id="$(printf '%s' "$RAW_CLOUDFLARE_ACCOUNT_ID" | tr -d '\r\n[:space:]')"
          project_name="$(printf '%s' "$RAW_CLOUDFLARE_PAGES_PROJECT_NAME" | tr -d '\r\n[:space:]')"

          if [ -z "$api_token" ]; then
            echo "Missing secret: CLOUDFLARE_API_TOKEN"
            exit 1
          fi
          if [ -z "$account_id" ]; then
            echo "Missing secret: CLOUDFLARE_ACCOUNT_ID"
            exit 1
          fi
          if [ -z "$project_name" ]; then
            echo "Missing secret: CLOUDFLARE_PAGES_PROJECT_NAME"
            exit 1
          fi

          echo "::add-mask::$api_token"
          echo "::add-mask::$account_id"
          echo "::add-mask::$project_name"

          echo "CLOUDFLARE_API_TOKEN=$api_token" >> "$GITHUB_ENV"
          echo "CLOUDFLARE_ACCOUNT_ID=$account_id" >> "$GITHUB_ENV"
          echo "CLOUDFLARE_PAGES_PROJECT_NAME=$project_name" >> "$GITHUB_ENV"

          echo "Cloudflare account id length: ${#account_id}"
          echo "Cloudflare project name length: ${#project_name}"
      - name: Verify project visibility via Cloudflare API
        run: |
          set -euo pipefail
          list_api_url="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects"
          http_code="$(curl -sS -o cf_projects_check.json -w "%{http_code}" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            "$list_api_url")"

          if [ "$http_code" != "200" ]; then
            echo "Cloudflare project list check failed with HTTP ${http_code}"
            cat cf_projects_check.json
            exit 1
          fi

          if ! command -v jq >/dev/null 2>&1; then
            echo "jq is required in runner to parse Cloudflare API response"
            exit 1
          fi

          echo "Projects visible to this token/account:"
          jq -r '.result[].name' cf_projects_check.json | sed 's/^/- /'

          if ! jq -e --arg project_name "$CLOUDFLARE_PAGES_PROJECT_NAME" \
            '.result[] | select(.name == $project_name)' \
            cf_projects_check.json >/dev/null; then
            echo "Configured project not found: $CLOUDFLARE_PAGES_PROJECT_NAME"
            exit 1
          fi
      - name: Deploy to Cloudflare Pages
        run: npx --yes wrangler pages deploy build/web --project-name="$CLOUDFLARE_PAGES_PROJECT_NAME" --commit-dirty=true
